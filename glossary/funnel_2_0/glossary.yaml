# -----------------------------------------------------------------------------
# KPIs — the six headline funnel stages, in journey order.
# -----------------------------------------------------------------------------
kpis:
  - name: Leads
    stage: 1
    source_system: "SAP (C4C)"
    domain: ""
    status: under_approval
    implemented: true
    definition: >-
      Total number of leads captured across all channels during the selected
      analysis period. This KPI is calculated as the count of distinct
      LEAD_IDs, with walk-in visits that do not have a LEAD_ID counted
      separately and added to the total.
    pseudo_code: >-
      Count distinct LEAD_IDs created within the selected analysis period, then
      add the count of distinct walk-in enquiries where LEAD_ID is blank or
      null.
    technical:
      silver_source: sap_c4c_leads
      gold_product: customer_leads_long
      serve_stream: CUSTOMER_LEADS
      measure_columns: [leads, leads_without_walkins]
    measurement:
      grain: >-
        Distinct lead (LEAD_ID), plus walk-in enquiries with no LEAD_ID added on
        top.
      time_anchor: Lead creation date.
      scope: Sales org 5000 excluded. All channels and brands.
    notes: >-
      Org 5000 is excluded throughout. `leads_without_walkins` excludes
      pop-up / walk-in leads. The added walk-ins are exactly those with a
      blank / null LEAD_ID, so they cannot overlap the distinct-LEAD_ID count
      (no double counting).

  - name: Hot Leads
    stage: 2
    source_system: "SAP (C4C)"
    domain: ""
    status: under_approval
    implemented: true
    definition: >-
      Total number of qualified leads with strong purchase intent during the
      selected analysis period. A lead is considered qualified when its
      qualification is marked as Hot or when it has been passed to branch.
      Walk-in visits without a LEAD_ID are counted separately and added to the
      total.
    pseudo_code: >-
      Count distinct LEAD_IDs where QUALIFICATION = 'Hot' or PASS_TO_BRANCH_TIME
      is not blank, then add the count of distinct walk-in enquiries where
      LEAD_ID is blank or null.
    technical:
      silver_source: sap_c4c_leads
      gold_product: customer_leads_long
      serve_stream: CUSTOMER_LEADS
      measure_columns: [hot_leads, hot_leads_without_walkins]
    measurement:
      grain: >-
        Distinct lead (LEAD_ID) meeting the Hot rule, plus walk-in enquiries
        with no LEAD_ID added on top.
      time_anchor: Lead creation date.
      scope: Sales org 5000 excluded.
    notes: >-
      A subset of Leads. Qualification is `lead_qualification = 'Hot'` OR
      `pass_to_branch_time IS NOT NULL`. Current behaviour: **every walk-in
      enquiry is counted as a Hot Lead** (walk-ins are added to the total in
      full, not only qualified ones) — confirmed as intended, flagged here as a
      known simplification.

  - name: Visits
    stage: 3
    source_system: "SAP (C4C)"
    domain: ""
    status: under_approval
    implemented: true
    definition: >-
      Total number of showroom visits recorded during the selected analysis
      period for the chosen brand.
    pseudo_code: >-
      Count distinct OPPORTUNITY IDs within the selected analysis period.
    technical:
      silver_source: [sap_c4c_opportunity_header, sap_c4c_opportunity_item]
      gold_product: customer_enquiries_long
      serve_stream: CUSTOMER_ENQUIRIES
      measure_columns: [opportunities, open_opportunities_14d]
    measurement:
      grain: >-
        Distinct opportunity (OPPORTUNITY_ID). "Visit" = opportunity, not a
        verified physical showroom visit.
      time_anchor: Opportunity creation date.
      scope: Sales org 5000 excluded. Selected brand / division.
    notes: >-
      A showroom visit is modelled as a C4C opportunity. `open_opportunities_14d`
      = opportunity still Open with a test-drive gap threshold. **To verify:** the
      column name says `14d` but `docs/Funnel2.0.md` describes the threshold as
      "> 15 days" — the build (`customer_enquiries_long`) is not in this repo, so
      the actual value (14 vs 15 days) must be confirmed against that pipeline.

  - name: Test Drives
    stage: 4
    source_system: "SAP (C4C)"
    domain: ""
    status: under_approval
    implemented: true
    definition: >-
      Total number of test drives completed during the selected analysis period
      for the chosen brand.
    pseudo_code: >-
      Count of unique showroom visits where the related enquiry/opportunity has
      a test-drive activity marked as completed. Completion is identified when a
      C4C follow-up activity has TYPE = 'Test Drive' and STATUS = 'Completed'.
      The completed timestamp is derived from the latest LAST_UPDATE_DATE of the
      activity. The analysis period is based on this completed timestamp.
    technical:
      silver_source: sap_c4c_follow_up_activities
      gold_product: customer_enquiries_long
      serve_stream: CUSTOMER_TESTDRIVES
      measure_columns:
        - test_drives_booked
        - test_drives_completed
        - test_drives_oepn
        - test_drives_noshow
        - test_drives_cancelled
    measurement:
      grain: >-
        Completed test-drive activity on an opportunity (TYPE = 'Test Drive',
        STATUS = 'Completed').
      time_anchor: Test-drive completion timestamp (latest LAST_UPDATE_DATE).
      scope: Selected brand / division.
    notes: >-
      The headline KPI is completed test drives. Booked / Open / No-show /
      Cancelled are additional lifecycle measures on the same stage. The "open"
      measure column is spelled `test_drives_oepn` (a typo in the physical
      schema — kept as-is so the glossary matches the real column).

  - name: Total Reservations
    stage: 5
    source_system: "SAP"
    domain: ""
    status: under_approval
    implemented: true
    definition: >-
      Total number of reservation items (sum of item quantity) created during
      the selected analysis period for the chosen brand.
    pseudo_code: >-
      Sum ITEM QUANTITY for reservation items where ORDER ITEM CREATION DATE is
      within the selected analysis period and ORDER TYPE IN ('Standard Order',
      'Fleet Order', 'AFM Corporate Order').
    technical:
      silver_source: [PAD_100_sales_document_header, PAD_100_sales_document_item_data]
      gold_product: sales_ordr_vn_d
      serve_stream: CUSTOMER_ORDERS
      measure_columns: [total_order_items, orders, orders_with_deposite]
    sub_measures:
      - name: Order with deposit
        column: orders_with_deposite
        definition: >-
          A reservation order for which a customer deposit / down-payment has
          been recorded — a subset of Total Reservations. Identified from the
          sales-document flow via the down-payment request billing type FAZ
          (`PAD_100_sales_document_flow` ⋈ `PAD_100_billing_document_header_data`),
          with the down-payment amount posted to special GL account `A`
          (`DWPYMNT`) in `PAD_100_accounting_document_segment`.
      - name: Order tagged
        column: customer_tagged
        definition: >-
          A reservation order carrying the `customer_tagged` business flag — an
          order tagged to an identified end customer, as opposed to an
          unallocated stock order. Derived on the order fact (`sales_ordr_vn_d`)
          alongside `customer_linked` (the retail-linked reservation flag). **To
          verify:** the exact tagging rule lives in the `sales_ordr_vn_d` build,
          which is not in this repo, so the derivation must be confirmed against
          that pipeline.
    measurement:
      grain: >-
        Reservation order line item. `item_quantity` is a =1 line flag, so the
        SUM is a count of line items, not a sum of vehicle quantities.
      time_anchor: Order item creation date (`sales_item_creation_date`).
      scope: >-
        Order type ZOR / YOR / TA. No `sales_group` filter — includes retail,
        fleet and corporate.
    notes: >-
      Current implementation in Funnel 2.0. Not used by BYD (available in BYD
      Dashboard legacy and Funnel 2.0). Order types map to SAP codes ZOR / YOR /
      TA (Standard / Fleet / AFM Corporate). `item_quantity` is a line flag, so
      SUM counts reservation order line items. No `sales_group` filter — includes
      retail, fleet and corporate. See the proposed unique-orders alternative
      below.

  - name: Total Reservation (Proposed — unique orders)
    stage: 5
    source_system: "SAP"
    domain: ""
    status: proposed
    implemented: false
    definition: >-
      Number of unique reservations (sales order numbers) created during the
      selected analysis period.
    pseudo_code: >-
      Count distinct ORDER NUMBER where ORDER CREATION DATE is within the
      selected analysis period and ORDER TYPE IN ('Standard Order', 'Fleet
      Order', 'AFM Corporate Order').
    technical:
      silver_source: [PAD_100_sales_document_header, PAD_100_sales_document_item_data]
      gold_product: sales_ordr_vn_d
      measure_columns: []
    measurement:
      grain: Distinct reservation order (sales order number).
      time_anchor: Order creation date.
      scope: >-
        Order type ZOR / YOR / TA. Assumes a one-order-one-VIN process change
        (see notes).
    notes: >-
      Proposed alternative to the current Total Reservations KPI, raised for
      discussion. Counts one reservation per order (distinct order number)
      instead of summing item quantities. Requires a process change so that one
      order carries one VIN / order item — today multiple order items are allowed
      per order, which is why the current KPI sums line items. Not implemented.

  - name: Invoices
    stage: 6
    source_system: "SAP"
    domain: ""
    status: under_approval
    implemented: true
    definition: >-
      Total number of vehicle invoices generated during the selected analysis
      period for the selected brand. A sold vehicle invoice adds 1 to the total,
      while a reversed invoice subtracts 1. This gives the final number of
      invoices after accounting for reversals.
    pseudo_code: >-
      For the selected period and brand, sum the invoice transaction value: +1
      for sold invoices and -1 for reversed invoices. The result is the net
      number of invoiced vehicles.
    technical:
      silver_source: PAD_100_billing_details_new
      gold_product: sales_newu_usud_sals_vn_d_view
      serve_stream: CUSTOMER_INVOICES
      measure_columns: [invoices]
    measurement:
      grain: >-
        Net billing-line volume (`sales_volume_quantity`): +1 per sold invoice,
        -1 per reversal.
      time_anchor: Billing date (`billing_date`).
      scope: >-
        Deduped to `flag_cancellation = 0`. New / Used split by distribution
        channel (10 / 20). No `sales_group` filter.
    notes: >-
      Net of reversals. Deduped via `flag_cancellation = 0`. New / Used split by
      distribution channel (10 / 20). No `sales_group` filter.

  - name: Total Open Reservations (Reservation Bank)
    stage: 7
    source_system: "SAP"
    domain: ""
    status: under_approval
    implemented: false
    aliases: [Order Bank, Open Orders, Reservation Bank]
    definition: >-
      Sum of reservation item quantities for open reservations as of the
      selected snapshot date.
    pseudo_code: >-
      Sum ITEM QUANTITY for reservation items where SALES ORDER NUMBER does not
      start with '0020' or '0060', REASON FOR REJECTION is blank, SECONDARY
      STATUS is either 'Sales Order Created' or blank. Additionally, if any
      duplicate VIN rows exist, they are removed.
    technical:
      silver_source: []
      measure_columns: []
    measurement:
      grain: >-
        Open reservation item quantity as of the snapshot; duplicate VIN rows
        removed.
      time_anchor: Snapshot (as-of) date — a point-in-time balance, not a period sum.
      scope: >-
        Sales order number not starting '0020' / '0060'; no reason for rejection;
        secondary status 'Sales Order Created' or blank.
    notes: >-
      New KPI — not yet implemented in the Funnel 2.0 pipeline; lineage and
      measure columns to be defined at implementation. Also known as the order
      bank / open orders. A stock (snapshot) measure of the open reservation
      bank, distinct from the Total Reservations flow KPI.

# -----------------------------------------------------------------------------
# Data-quality invariants — relationships that should always hold within a
# single reporting period. These are checkable by the `kpi` asserts in
# dq_framework. Only same-period subset relationships are listed; cross-stage
# funnel drop-off (Leads > Visits > ...) is an expected *trend*, not a hard
# invariant, because a lead in one period may convert in a later one.
# -----------------------------------------------------------------------------
dq_invariants:
  - rule: "hot_leads <= leads"
    rationale: Hot Leads is a qualified subset of Leads on the same lead-creation anchor.
  - rule: "leads_without_walkins <= leads"
    rationale: Walk-ins are additive, so excluding them cannot increase the count.
  - rule: "hot_leads_without_walkins <= hot_leads"
    rationale: Same walk-in exclusion, applied to Hot Leads.
  - rule: "test_drives_completed <= test_drives_booked"
    rationale: Completed is a lifecycle subset of Booked on the same stage.
  - rule: "test_drives_oepn + test_drives_completed + test_drives_noshow + test_drives_cancelled <= test_drives_booked"
    rationale: The lifecycle states partition (or sub-partition) the booked test drives.
  - rule: "web_attributed_<measure> <= <measure>"
    rationale: Web-attributed counterparts are a subset of each base measure.
  - rule: "every measure >= 0"
    rationale: All funnel measures are non-negative counts (Invoices is net of reversals but should not go negative in aggregate).

# -----------------------------------------------------------------------------
# Supporting business terms — the vocabulary the KPI definitions rely on.
# -----------------------------------------------------------------------------
terms:
  - term: LEAD_ID
    definition: >-
      The unique identifier of a lead in SAP C4C. Distinct LEAD_IDs are the
      counting unit for the Leads and Hot Leads KPIs.
    related: [Leads, Hot Leads, Walk-in]

  - term: OPPORTUNITY_ID
    definition: >-
      The unique identifier of a C4C opportunity. One opportunity represents one
      showroom visit; distinct OPPORTUNITY_IDs are the counting unit for Visits.
    related: [Visits, Test Drives]

  - term: Walk-in
    definition: >-
      A showroom visitor recorded without an originating LEAD_ID (a walk-in
      enquiry where LEAD_ID is blank or null). Walk-ins are counted separately
      and added to the Leads and Hot Leads totals so no in-person visitor is
      missed.
    related: [Leads, Hot Leads, LEAD_ID]

  - term: Analysis period
    definition: >-
      The user-selected reporting date range a KPI is measured over. Each KPI
      declares which timestamp anchors it to the period (e.g. lead creation
      date, order item creation date, test-drive completion timestamp).
    related: [Leads, Test Drives, Total Reservations, Invoices]

  - term: Chosen brand / division
    definition: >-
      The vehicle brand (SAP division) the report is filtered to. Visits, Test
      Drives, Total Reservations and Invoices are scoped to the selected brand.
    related: [Visits, Total Reservations, Invoices]

  - term: Qualification (Hot)
    definition: >-
      The C4C lead-qualification value that marks strong purchase intent. A lead
      with QUALIFICATION = 'Hot' qualifies as a Hot Lead.
    related: [Hot Leads]

  - term: Pass to branch
    definition: >-
      The event of handing a lead to a branch for follow-up, timestamped by
      PASS_TO_BRANCH_TIME. A lead with this timestamp set also qualifies as a
      Hot Lead, even if not explicitly marked Hot.
    related: [Hot Leads]

  - term: Test-drive activity
    definition: >-
      A C4C follow-up activity with TYPE = 'Test Drive'. Its STATUS
      ('Completed', open, no-show, cancelled) drives the Test Drives lifecycle
      measures; STATUS = 'Completed' drives the headline KPI.
    related: [Test Drives]

  - term: Reservation item
    definition: >-
      A single sales-document line item of a reservation order. Total
      Reservations sums the item quantity (a line flag) across reservation
      items, so it counts line items rather than distinct orders.
    related: [Total Reservations, Order type]

  - term: Order type
    definition: >-
      The SAP sales-document type classifying a reservation. Reservations count
      ORDER TYPE IN Standard Order (ZOR), Fleet Order (YOR) and AFM Corporate
      Order (TA).
    related: [Total Reservations, Reservation item]

  - term: Order with deposit
    definition: >-
      A reservation order for which a customer deposit / down-payment has been
      recorded. Surfaced as the `orders_with_deposite` sub-measure of Total
      Reservations, so it is a subset of the reservations counted in that stage.
      The deposit is identified from the sales-document flow via the down-payment
      request billing type FAZ (`PAD_100_sales_document_flow` ⋈
      `PAD_100_billing_document_header_data`), with the down-payment amount posted
      to special GL account `A` (`DWPYMNT`) in
      `PAD_100_accounting_document_segment`.
    related: [Total Reservations, Reservation item, Order type]

  - term: Order tagged
    definition: >-
      A reservation order carrying the `customer_tagged` business flag — an order
      that has been tagged to an identified end customer, as opposed to an
      unallocated stock order. It is a business flag derived on the order fact
      (`sales_ordr_vn_d`), alongside `customer_linked` (the retail-linked
      reservation flag). **To verify:** the exact tagging rule lives in the
      `sales_ordr_vn_d` build, which is not in this repo, so the precise
      derivation must be confirmed against that pipeline.
    related: [Total Reservations, Order with deposit, Reservation item]

  - term: Order Bank (Reservation Bank)
    definition: >-
      The stock of open reservations outstanding as of a snapshot date — orders
      taken but not yet invoiced or cancelled. Measured by Total Open
      Reservations. A point-in-time balance, unlike the flow KPIs that count
      events within a period.
    related: [Total Open Reservations (Reservation Bank), Total Reservations, Open reservation]

  - term: Open reservation
    definition: >-
      A reservation still live at the snapshot date — its sales order number
      does not start with '0020' or '0060', it has no reason for rejection, and
      its secondary status is 'Sales Order Created' or blank.
    related: [Total Open Reservations (Reservation Bank), Order Bank (Reservation Bank)]

  - term: Snapshot date
    definition: >-
      The as-of date a stock (bank) metric is evaluated on. Total Open
      Reservations is a balance as of the selected snapshot date, rather than a
      sum over an analysis period.
    related: [Total Open Reservations (Reservation Bank), Analysis period]

  - term: Invoice reversal
    definition: >-
      A cancellation of a previously issued invoice. In the Invoices KPI a sold
      invoice contributes +1 and a reversal contributes -1, so the total is net
      of reversals.
    related: [Invoices]

  - term: SAP C4C
    definition: >-
      SAP Cloud for Customer, the CRM system of record for the front of the
      funnel — leads, opportunities (visits) and follow-up activities (test
      drives).
    related: [Leads, Hot Leads, Visits, Test Drives]

  - term: Funnel group
    definition: >-
      The channel a record originated through — Digital, Walk-in or Others —
      used to split every key funnel KPI by channel. Derived from the record's
      normalized SOURCE and TYPE via the lead/enquiry type mapping
      (`lead_type_mapping_new`); GROUP is the resulting funnel group.
    related: [Leads, Hot Leads, Visits, Test Drives, Total Reservations, Invoices]

# -----------------------------------------------------------------------------
# Funnel groups — the channel classification applied to every key funnel KPI.
# A record's GROUP (Digital / Walk-in / Others) is derived from its normalized
# SOURCE and TYPE via lead_type_mapping_new. The `mapping` below is the
# authoritative SOURCE/TYPE -> GROUP lookup.
# -----------------------------------------------------------------------------
funnel_groups:
  description: >-
    Funnel groups classify where demand originated so every key funnel KPI
    (Leads → Invoices) can be reported by channel. The group is resolved from
    the record's normalized SOURCE, rolled up to TYPE, then to GROUP, using the
    lead / enquiry type mapping (`lead_type_mapping_new`).

  groups:
    - name: Digital
      definition: >-
        Online / digitally-originated demand — website and app forms, ecommerce,
        social media, live chat / WhatsApp, CRM enquiries and the Blue app.
    - name: Walk-in
      definition: >-
        In-person showroom demand with no digital origin — physical walk-ins and
        showroom pop-up (kiosk) leads / sales. Walk-ins typically carry no
        LEAD_ID and are counted separately in Leads / Hot Leads.
    - name: Others
      definition: >-
        Non-digital, non-walk-in channels — B2B / fleet, events, print, SMS,
        telephone, showroom promotions / re-solicitation, generic product / offer
        / appointment / prospect enquiries, referrals and migrated records.
    - name: Unclassified
      definition: >-
        Records whose GROUP / TYPE / SOURCE do not map to any known channel
        (all null). Reported as Unclassified.

  # How the funnel group is identified for each key funnel KPI.
  per_kpi:
    - kpi: Leads
      rule: >-
        Native — from the lead's normalized source → type → GROUP. Walk-ins are
        leads originating at a pop-up / walk-in sales office (typically no
        LEAD_ID); Digital / Others come from `lead_type_mapping_new`.
    - kpi: Hot Leads
      rule: >-
        Same as Leads (Hot Leads is a qualified subset of Leads and inherits its
        group).
    - kpi: Visits
      rule: >-
        Native — from the opportunity / enquiry source → type → GROUP.
    - kpi: Test Drives
      rule: >-
        Inherited from the parent enquiry's group (a test drive is a follow-up
        activity on the enquiry).
    - kpi: Total Reservations
      rule: >-
        Inherited from the linked enquiry via `enquiry_id`; Digital is captured
        as the `web_attributed_*` measures through the lead back-join
        (`sales_group IN ('001','040')`). Orders with no enquiry link are
        Unclassified for group.
    - kpi: Total Reservation (Proposed — unique orders)
      rule: >-
        Proposed — same enquiry-inherited grouping as Total Reservations, just
        counted per distinct order rather than per line item.
    - kpi: Invoices
      rule: >-
        Inherited from the linked order → enquiry (`sales_order_number →
        enquiry_id`); Digital via the `web_attributed_*` back-join, same as
        Total Reservations.
    - kpi: Total Open Reservations (Reservation Bank)
      rule: >-
        Not yet implemented — will follow the Total Reservations rule (inherited
        from the linked enquiry) once the metric is built.

  # Authoritative lead_group / lead_type / lead_source mapping, confirmed by the
  # steward (order and casing preserved from the source list). null = no source.
  mapping:
    - {group: Digital, type: Live Chat, source: Whatsapp}
    - {group: Digital, type: Social, source: Instagram}
